##---NGFW(here we are applying firewalling rules)---###


####This is for when a user is to be bypassed from all firewall rules

    # --- 1. THE PERMISSION SLIP ---
    # Adds the user's IP to the 'allowed_ip4' set in the filter table. 
    # This grants the device permission to send traffic THROUGH the router to the Internet.

        nft add element inet filter allowed_ip4 { <local_ip> }

    # --- 2. THE PORTAL BYPASS ---
    # Adds the IP to the 'allowed_ip4' set in the NAT table. 
    # This tells the router: "This user is authenticated; stop redirecting them to the login page."

        nft add element inet nat allowed_ip4 { <local_ip> }

    # --- 3. THE BANDWIDTH & ROUTING TAG ---
    # Maps the IP to a specific 32-bit hex mark (0x00[ISP][CLASS]).
    # This 'mark' is used by the system to decide which ISP line to use and what speed limit to apply.

        ft add element inet mangle user4_marks { <local_ip> : 0x00<isp_mark><tc_class_marks> }

    # --- 4. IMMEDIATE ACTION (NAT) ---
    # 'insert rule' places this at the very TOP of the prerouting chain.
    # Use this for high-priority overrides, like forcing a specific device to a proxy or bypassing all NAT.

        nft insert rule inet nat prerouting ip saddr <local_ip> <action>

    # --- 5. HOST PROTECTION (INBOUND) ---
    # Manages traffic sent FROM the user specifically TO the router's internal services (like SSH or the Web UI).
    # <action> could be 'accept' to allow management or 'drop' to isolate the user from the router.

        nft add rule inet filter input ip saddr <local_ip> <action>

    # --- 6. HOST PROTECTION (OUTBOUND) ---
    # Manages traffic sent FROM the router itself TO the user's device.
    # This is often used to allow the router to send status pings or heartbeat checks to the client.

        nft add rule inet filter input ip daddr <local_ip> <action>

####This is for when a users access is to be managed to and from specified port protocol and ip and this ip is exempt from all firewall rules

    # --- SECTION 1: GLOBAL ACCESS (Whitelisting) ---

    # Permits the user to send traffic THROUGH the router to the internet.

        nft add element inet filter allowed_ip4 { <local_ip> }

    # Exempts the user from the Captive Portal redirection, allowing them to see real websites.

        nft add element inet nat allowed_ip4 { <local_ip> }


    # --- SECTION 2: TRAFFIC CONTROL (Bandwidth & Routing) ---

    # Assigns a hex "Mark" to the user's packets. 
    # This mark is used by 'tc' (Traffic Control) to limit speed and by 'ip rule' to select an ISP.
        
        nft add element inet mangle user4_marks { <local_ip> : 0x00<isp_mark><tc_class_marks> }


    # --- SECTION 3: SPECIFIC NAT RULES (Redirection/Port Forwarding) ---

    # 'insert rule' puts this at the TOP of the list.
    # Used for special overrides, like bypassing a VPN for a specific destination (Split Tunneling).
        
        nft insert rule inet nat prerouting ip saddr <local_ip> ip daddr <destination_ip> <action>


    # --- SECTION 4: ROUTER INTERACTION (Input Chain) ---

    # Granular control: Allows a specific user to access a specific service ON the router.
    # Example: Allowing a technician to access the SSH port (22) from a specific local IP.
        
        nft add rule inet filter input ip saddr <local_ip> ip daddr <destination_ip> <protocol> sport <source_port> <protocol> dport <destination_port> <action>

    # The "Emergency Brake" or "Direct Access" rule:
    # Determines if the router itself should accept or drop traffic coming directly to it from this IP.

        nft add rule inet filter input ip daddr <local_ip> <action>

####This is for when a users access is to be managed to and from specified ip and this ip is exempt from all firewall rules

    # 1. PERMANENT WHITELISTING (FORWARD CHAIN)
    # Grants this local device general permission to pass through the router to the internet.
        
        nft add element inet filter allowed_ip4 { <local_ip> }

    # 2. PORTAL BYPASS (NAT PREROUTING)
    # Prevents the router from hijacking this user's traffic and sending them to the Login/Splash page.
        
        nft add element inet nat allowed_ip4 { <local_ip> }

    # 3. TRAFFIC LABELING (MANGLE)
    # Ensures the user still has an ISP ID and Quality of Service (QoS) class attached for speed control.

        nft add element inet mangle user4_marks { <local_ip> : 0x00<isp_mark><tc_class_marks> }

    # 4. DESTINATION-SPECIFIC NAT EXEMPTION
    # 'insert' puts this at priority -1. It ensures that traffic to <destination_ip> 
    # is handled BEFORE any other redirection or hijacking rules can touch it.

        nft insert rule inet nat prerouting ip saddr <local_ip> ip daddr <destination_ip> <action>

    # 5. ADMINISTRATIVE INPUT (TO THE ROUTER)
    # Specifically allows the user to send packets directed AT the router's own IP 
    # when communicating with the specified destination (useful for management/VPNs).

        nft add rule inet filter input ip saddr <local_ip> ip daddr <destination_ip> <action>

    # 6. ROUTER-TO-CLIENT COMMUNICATION
    # Ensures that responses coming from the router itself back to the local device 
    # are permitted without being caught in global restriction filters.

        nft add rule inet filter input ip daddr <local_ip> <action>

