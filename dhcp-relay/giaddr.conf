// ============================================================================
// Kea DHCPv4 configuration
// giaddr (Gateway IP Address) based subnet selection
//
// Design notes:
// - Subnet selection is driven exclusively by giaddr set by the relay
// - No DHCP Option 82 classification is used
// - This keeps the relay stateless and the server deterministic
// ============================================================================

{
  "Dhcp4": {

    // ------------------------------------------------------------------------
    // Interface binding
    //
    // Kea listens only on the server-facing interface.
    // It never listens on client-facing or relay VLAN interfaces.
    // ------------------------------------------------------------------------
    "interfaces-config": {
      "interfaces": [
        "enp7s0"
      ]
    },

    // ------------------------------------------------------------------------
    // Lease database
    //
    // Memfile backend is used for simplicity.
    // Leases are periodically flushed to disk.
    // ------------------------------------------------------------------------
    "lease-database": {
      "type": "memfile",
      "persist": true,
      "name": "/var/lib/kea/kea-leases4.csv"
    },

    // ------------------------------------------------------------------------
    // Hooks libraries
    //
    // libdhcp_legal_log.so enables forensic-style logging of lease activity.
    // This is optional and does not affect packet processing unless enabled.
    // ------------------------------------------------------------------------
    "hooks-libraries": [
      {
        "library": "/usr/lib/x86_64-linux-gnu/kea/hooks/libdhcp_legal_log.so",
        "parameters": {
          "path": "/var/log/kea",
          "base-name": "kea-forensic4"
        }
      }
    ],

    // ------------------------------------------------------------------------
    // Subnet definitions
    //
    // Subnet selection rules:
    // 1. If giaddr is present, Kea attempts to match it against the "relay"
    //    ip-addresses field.
    // 2. If a match is found, that subnet is selected.
    // 3. Client broadcast address or source IP is NOT used for relay subnets.
    // ------------------------------------------------------------------------
    "subnet4": [

      // ----------------------------------------------------------------------
      // Local / server-side subnet
      //
      // Used only if the DHCP request originates directly on this network.
      // ----------------------------------------------------------------------
      {
        "id": 1,
        "subnet": "192.168.1.0/24",
        "pools": [
          {
            "pool": "192.168.1.10 - 192.168.1.240"
          }
        ]
      },

      // ----------------------------------------------------------------------
      // VLAN 10 – relayed subnet
      //
      // The relay sets giaddr = 192.168.10.1
      // This value is the authoritative selector for this subnet.
      // ----------------------------------------------------------------------
      {
        "id": 10,
        "subnet": "192.168.10.0/24",
        "relay": {
          "ip-addresses": [
            "192.168.10.1"
          ]
        },
        "pools": [
          {
            "pool": "192.168.10.10 - 192.168.10.200"
          }
        ]
      }
    ],

    // ------------------------------------------------------------------------
    // Lease timers
    //
    // Standard values; adjust to operational requirements.
    // ------------------------------------------------------------------------
    "valid-lifetime": 3600,
    "renew-timer": 900,
    "rebind-timer": 1800,

    // ------------------------------------------------------------------------
    // Logging
    //
    // DEBUG + debuglevel 99 is intentionally verbose for testing.
    // For production, reduce severity to INFO and lower debuglevel.
    // ------------------------------------------------------------------------
    "loggers": [
      {
        "name": "kea-dhcp4",
        "severity": "DEBUG",
        "debuglevel": 99,
        "output_options": [
          {
            "output": "/var/log/kea/kea-dhcp4-debug.log",
            "maxsize": 104857600,
            "maxver": 1
          }
        ]
      }
    ]
  }
}
