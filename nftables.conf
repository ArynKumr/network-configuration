#!/usr/sbin/nft -f
# This "shebang" tells the Linux shell to run this file through the 'nft' utility.
# The '-f' flag means 'filename', instructing the utility to read and execute the rules below.

flush ruleset
# This is a "safety first" command. It wipes all existing firewall rules from memory.
# Without this, if you ran the script twice, you would have duplicate or conflicting rules.

table inet filter {
# 'inet' is a special family that allows you to write one rule that applies to both 
# IPv4 and IPv6.
# The 'filter' table is where the "Yes/No" decisions about traffic passing through are made.

  ### --- SECTION 1: DEFINING THE SETS --- ###
  # Sets are like high-speed databases. Instead of writing 100 rules for 100 users, 
  # you write 1 rule that checks if a user is "in the list."

  set allowed_ip4 {    
    type ipv4_addr;    # Stores 32-bit IPv4 addresses.
    flags interval;    # Allows the firewall to understand subnets (like 192.168.1.0/24).
  } # PURPOSE: Any IP added here is "Whitelisted" for internet access in the Forward chain.

  set allowed_ip6 {
    type ipv6_addr;    # Stores 128-bit IPv6 addresses.
    flags interval;    # Allows for IPv6 network ranges (prefixes).
  } # PURPOSE: Whitelist for IPv6 devices.

  set allowed_macs {
    type ether_addr;   # Stores the physical hardware address (MAC) of the network card.
  } # PURPOSE: Use this for devices that change IPs often but should always have access.

  set wan_ifaces {
    type ifname;       # Stores interface names.
  } # PURPOSE: Identifies which interface leads to the "Outside World" (Wide Area Network).

  set lan_ifaces {
    type ifname;       # Stores interface names.
  } # PURPOSE: Identifies which interface leads to your "Private Office Network" (Local Area Network).

  map allowed_ip4_mac {
    type ipv4_addr . ether_addr : verdict; 
    # This is a 'Concatenated Map'. It links an IP address TO a specific MAC address.
  } # PURPOSE: High Security. It prevents "IP Spoofing"—a user can't just steal an allowed IP
    # unless they also have the correct physical hardware address.

  map allowed_ip6_mac {
    type ipv6_addr . ether_addr : verdict;
    # The IPv6 version of the IP+MAC security binding described above.
  }

  ### --- SECTION 2: THE WATCHLIST (LOGGING SETS) --- ###

  set log_users_v4 {
    type ipv4_addr;    
    flags interval;    
  } # PURPOSE: Any IP in this list will have its nft pathway recorded in the system logs (/var/log/syslog).

  set log_users_v6 {
    type ipv6_addr;
    flags interval;
  } # PURPOSE: Any IPv6 in this list will have its nft pathway recorded in the system logs (/var/log/syslog)

  set log_users_mac {
    type ether_addr;   
  } # PURPOSE: Any MACs in this list will have its nft pathway recorded in the system logs (/var/log/syslog).

  ### --- SECTION 3: THE CHAINS (THE ACTUAL LOGIC) --- ###

  chain input {
    # 'hook input': This chain handles traffic directed AT the router itself (like you logging into the UI).
    type filter hook input priority 0; policy accept;

    tcp dport 80 ct state new tcp flags & (fin|syn|rst|ack) == syn ct count over 50 reject with tcp reset
    # ANTI-DOS PROTECTION:
    # 1. 'tcp dport 80': Checks traffic for the web server port.
    # 2. 'ct count over 50': If one single computer tries to open more than 50 connections at once...
    # 3. 'reject': The router slams the door and sends a "Reset" signal, stopping a crash or overload.
  }

  chain prerouting {
    # 'hook prerouting': This is the first place a packet goes when it hits the router.
    type filter hook prerouting priority -100; policy accept;

    udp dport 53 queue num 0 bypass #queue number are subject to change abd will be decided upon firewall deployment
    tcp dport 53 queue num 0 bypass #queue number are subject to change abd will be decided upon firewall deployment
    # DNS FILTERING:
    # 'queue num selected by the software': Sends DNS requests (Port 53) to netfilter running on the firewall.
    # 'bypass': If that software crashes, the router will let the DNS pass through anyway so the internet doesn't "break."
  }

  chain forward {
    # 'hook forward': This is the "Security Checkpoint." It handles traffic going FROM your PC TO the Internet.
    # 'policy drop': This is critical. It means "Block everything unless I specifically allow it below."
    type filter hook forward priority 0; policy drop;
    
    tcp dport 853 drop # Blocks 'DNS over TLS'. 
    udp dport 853 drop # Why? To prevent devices from hiding their DNS queries so the router can still filter them.
    udp dport 443 drop # Blocks 'QUIC/HTTP3'. This forces browsers to use standard TCP, which is easier to manage.

    ct state vmap { established : accept, related : accept, invalid : drop }
    # THE MEMORY MAP:
    # 'established': If the router already approved a connection 2 seconds ago, let the rest of the packets through.
    # 'invalid': If a packet looks "broken" or "hacked," throw it away immediately.

    # --- RULE A: LOGGING AND CHECKING IP+MAC PAIRS ---
    iifname @lan_ifaces oifname @wan_ifaces ip saddr @log_users_v4 log prefix "[FW-FILTER-FWD-IPMAC] " level info
    # If the user is on the 'watchlist', write their IP and intent to the log file.
    iifname @lan_ifaces oifname @wan_ifaces ip saddr . ether saddr vmap @allowed_ip4_mac
    # Look at the 'allowed_ip4_mac' map. If the combination of IP and MAC matches, the 'verdict' is 'accept'.

    # --- RULE B: LOGGING AND CHECKING IPv6+MAC PAIRS ---
    iifname @lan_ifaces oifname @wan_ifaces ip6 saddr @log_users_v6 log prefix "[FW-FILTER-FWD-IP6MAC] " level info
    iifname @lan_ifaces oifname @wan_ifaces ip6 saddr . ether saddr vmap @allowed_ip6_mac
    # Same as above, but for IPv6.

    # --- RULE C: THE MAC ONLY LIST (MAC ONLY) ---
    iifname @lan_ifaces oifname @wan_ifaces ether saddr @log_users_mac ip saddr @log_users_v4 log prefix "[FW-FILTER-FWD-MACONLY] " level info
    iifname @lan_ifaces oifname @wan_ifaces ether saddr @allowed_macs accept
    # If your hardware address is in 'allowed_macs', you get to go to the internet regardless of your IP.

    # --- RULE D: THE IP ONLY LIST  ---
    iifname @lan_ifaces oifname @wan_ifaces ip saddr @log_users_v4 log prefix "[FW-FILTER-FWD-IP4ONLY] ACCEPT " level info
    iifname @lan_ifaces oifname @wan_ifaces ip saddr @allowed_ip4 accept
    # Typical whitelist check: "Is your IP in the allowed list? Yes? Pass through."

    # --- RULE E: THE IPV6 ONLY LIST ---
    iifname @lan_ifaces oifname @wan_ifaces ip6 saddr @log_users_v6 log prefix "[FW-FILTER-FWD-IP6ONLY] ACCEPT " level info
    iifname @lan_ifaces oifname @wan_ifaces ip6 saddr @allowed_ip6 accept
    # The IPv6 version of the whitelist check.

    # --- THE TRAP (LOGGING DROPS) ---
    ip saddr @log_users_v4 log prefix "[FW-FILTER-FWD-DROP] " level info
    ip6 saddr @log_users_v6 log prefix "[FW-FILTER-FWD-DROP6] " level info
    ether saddr @log_users_mac log prefix "[FW-FILTER-FWD-DROP-MAC] " level info
    # If a user on the watchlist reaches this far, it means they were NOT in any 'allowed' list. 
    # They will now be 'dropped' by the policy at the top, and we record that failure here.
  }
}

table inet nat {
# 'nat' table: This is where we modify the destination (where a packet is going) 
# or the source (who sent the packet) of network traffic.

  ### --- SECTION 1: THE LOCAL DATA LISTS (SETS) --- ###
  # These sets are repeated here because each table in nftables is independent. 
  # This table needs to know who is 'allowed' so it knows NOT to redirect them to a login page.

  set log_users_v4 {
    type ipv4_addr; # Stores 32-bit IPv4 addresses.
    flags interval; # Allows the firewall to understand subnets (like 192.168.1.0/24).
  } # PURPOSE: Tracks which IPv4 users should have their NAT activity logged.

  set log_users_v6 {
    type ipv6_addr; # Stores 128-bit IPv6 addresses.
    flags interval; # Allows for IPv6 network ranges (prefixes).
  } # PURPOSE: Tracks which IPv6 users should have their NAT activity logged.

  set log_users_mac {
    type ether_addr; # Stores the physical hardware address (MAC) of the network card.
  } # PURPOSE: Tracks users by hardware address for NAT logging.

  set allowed_ip4 {
    type ipv4_addr; # Stores 32-bit IPv4 addresses.
    flags interval; # Allows the firewall to understand subnets (like 192.168.1.0/24).
  } # PURPOSE: List of IPv4 users who have already logged in and can bypass the login portal.

  set allowed_ip6 {
    type ipv6_addr; # Stores 128-bit IPv6 addresses.
    flags interval; # Allows for IPv6 network ranges (prefixes).
  } # PURPOSE: List of IPv6 users who have already logged in and can bypass the login portal.

  set allowed_macs {
    type ether_addr;
  } # PURPOSE: Devices that are allowed to skip the login portal based on hardware address.

  map allowed_ip4_mac {
    type ipv4_addr . ether_addr : verdict;
  } # PURPOSE: Security binding. Verifies that the specific IP AND MAC address pair is authorized.

  map allowed_ip6_mac {
    type ipv6_addr . ether_addr : verdict;
  } # PURPOSE: Security binding for IPv6,  Verifies that the specific IPv6 AND MAC address pair is authorized.

  set wan_ifaces {
    type ifname;
  } # PURPOSE: List of interfaces connected to the Internet (e.g., 'eth0').

  set lan_ifaces {
    type ifname;
  } # PURPOSE: List of interfaces connected to your Home/Office devices (e.g., 'br0').

  ### --- SECTION 2: PREROUTING (DESTINATION NAT / REDIRECTION) --- ###

  chain prerouting {
    # 'hook prerouting': This happens as soon as a packet arrives. 
    # We use this to redirect traffic and send it somewhere else ie. our local dns server.
    type nat hook prerouting priority 0; policy accept;

    # --- DNS HIJACKING (FOR BLOCKED USERS) ---
    iifname @lan_ifaces meta mark & 0x01000000 == 0x01000000 udp dport 53 redirect to :5300
    iifname @lan_ifaces meta mark & 0x01000000 == 0x01000000 tcp dport 53 redirect to :5300
    # LOGIC: If a packet is 'marked' (by a web filter), 
    # its DNS requests are forced to port 5300. This is usually used to send the user 
    # to a "You are Blocked" notification page.

    # --- TRANSPARENT DNS PROXY ---
    iifname @lan_ifaces udp dport 53 redirect to :53
    iifname @lan_ifaces tcp dport 53 redirect to :53
    # LOGIC: No matter what DNS server a user has set on their laptop (like 8.8.8.8), 
    # the router intercepts it and uses its OWN DNS server instead.

    # --- THE "SKIP" RULES (AUTHENTICATED USERS) ---
    iifname @lan_ifaces ip saddr @allowed_ip4 accept
    iifname @lan_ifaces ip6 saddr @allowed_ip6 accept
    iifname @lan_ifaces ether saddr @allowed_macs accept
    iifname @lan_ifaces ip saddr . ether saddr vmap @allowed_ip4_mac
    iifname @lan_ifaces ip6 saddr . ether saddr vmap @allowed_ip6_mac
    # LOGIC: If a user is in any of these 'allowed' lists, 'accept' means "stop processing NAT rules."
    # This allows them to go to the actual internet instead of being redirected to a login page.

    # --- CAPTIVE PORTAL REDIRECTION ---
    iifname @lan_ifaces tcp dport 443 redirect to :443
    iifname @lan_ifaces tcp dport 80 redirect to :80
    # LOGIC: If a user reaches this line, it means they were NOT in the 'allowed' lists.
    # Any website they try to visit (HTTP or HTTPS) is redirected and sent to the 
    # router's local web server (Port 80/443), which shows the Login/Splash page.
  }

  ### --- SECTION 3: POSTROUTING (SOURCE NAT / MASQUERADE) --- ###

  chain postrouting {
    # 'hook postrouting': This happens just as the packet is leaving the router for the Internet.
    type nat hook postrouting priority 100; policy accept;

    # --- AUDIT LOGS ---
    oifname @wan_ifaces ip saddr @log_users_v4 log prefix "[FW-NAT-SNAT] " level info
    oifname @wan_ifaces ip6 saddr @log_users_v6 log prefix "[FW-NAT-SNAT] " level info
    oifname @wan_ifaces ether saddr @log_users_mac log prefix "[FW-NAT-SNAT] " level info
    # LOGIC: Records who is going out to the internet for tracking.

    # --- INTERNET SHARING (MASQUERADE) ---
    oifname @wan_ifaces masquerade
    # LOGIC: This is the masquerade line. It takes a private IP (like 192.168.1.5) 
    # and hides it behind your one public Internet IP so that you can have 
    # many devices sharing one connection.
  }
}

table inet mangle {
# 'mangle' table: Used to alter packet metadata. 
# Think of this as the "Labeling Room" where we stick IDs on packets so we can recognize them later.

  ### --- SECTION 1: THE LOGGING WATCHLIST --- ###
  # Repeated here so the mangle table knows which users' tagging events to record.

  set log_users_v4 {
    type ipv4_addr;
    flags interval;
  } # PURPOSE: IPv4 users whose "tagging" should be audited.

  set log_users_v6 {
    type ipv6_addr;
    flags interval;
  } # PURPOSE: IPv6 users whose "tagging" should be audited.

  set log_users_mac {
    type ether_addr;
    flags interval;
  } # PURPOSE: MAC addresses whose "tagging" should be audited.

  ### --- SECTION 2: THE MARKING MAPS --- ###
  # These maps act like a "Lookup Directory." 
  # Example: "If the IP is 192.168.1.5, give it Tag in this format 0x00ffFFFF. here ff is the isp id and FFFF is the tc class id"

  map user4_marks {
    type ipv4_addr : mark; 
  } # PURPOSE: Associates an IPv4 address with a specific numeric ID (mark).

  map user6_marks {
    type ipv6_addr : mark; 
  } # PURPOSE: Associates an IPv6 address with a specific numeric ID (mark).

  map user_mac_marks {
    type ether_addr : mark; 
  } # PURPOSE: Associates a physical MAC address with a specific numeric ID (mark).

  ### --- SECTION 3: THE TAGGING LOGIC (CHAINS) --- ###

  chain prerouting {
    # 'hook prerouting' with priority -150: Runs EXTREMELY early.
    # We want to tag the packet the very millisecond it enters the router.
    type filter hook prerouting priority -150; policy accept;

    # --- TAGGING UPLOAD TRAFFIC (User to Internet) ---
    meta mark set ip saddr map @user4_marks
    meta mark set ip6 saddr map @user6_marks
    meta mark set ether saddr map @user_mac_marks
    # LOGIC: Look at the packet's "Source Address" (the sender). 
    # Find that sender in our Maps and stick their specific numeric ID onto the packet header.

    ct mark set meta mark
    # LOGIC: 'ct' stands for Conntrack. This line is very important!
    # It marks the tag into the entire session. 
    # This way, the router remembers this user's tag for the life of the connection.
  }

  chain forward {
    # 'hook forward': Handles traffic passing through.
    type filter hook forward priority -150; policy accept;

    # --- TAGGING DOWNLOAD TRAFFIC (Internet to User) ---
    meta mark set ip daddr map @user4_marks
    meta mark set ip6 daddr map @user6_marks
    meta mark set ether daddr map @user_mac_marks
    # LOGIC: Look at the "Destination Address" (the receiver). 
    # Since the traffic is coming FROM the internet TO the user, we mark it 
    # based on where it is going. This allows the router to apply bandwidth 
    # limits (QoS) to the user's download speed.

    ct mark set meta mark
    # LOGIC: Again, saves this mark into the session memory (conntrack).
  }

  chain postrouting {
    # 'hook postrouting': The very last stage before the packet leaves.
    type filter hook postrouting priority -150;

    meta mark set ct mark
    # LOGIC: Sometimes NAT or other processes can strip a tag off.
    # This line looks at the "Connection Tracking" memory and re-applies 
    # the correct tag one last time to ensure it's there for any external tools.
  }
}

table inet webfilter {
# 'webfilter' table: Specifically handles handing off web traffic (HTTP/HTTPS) 
# to a netfilter program.

  ### --- SECTION 1: THE LOCAL DATA LISTS (SETS) --- ###

  set log_users_v4 {
    type ipv4_addr;    
    flags interval;
  } # PURPOSE: IPv4 users whose web requests should be recorded in the system logs for auditing.

  set log_users_v6 {
    type ipv6_addr;    
    flags interval;
  } # PURPOSE: IPv6 users whose web requests should be recorded.

  set log_users_mac {
    type ether_addr;
  } # PURPOSE: Tracks hardware addresses for web activity logging.

  set ALLOW_ACCESS {
    type ipv4_addr;    
    flags interval;
  } # PURPOSE: This is the "Filter List." Any IP in this set is flagged to have its 
    # web traffic (Port 80/443) sent to the inspection engine.

  set lan_ifaces {
    type ifname;       
  } # PURPOSE: Ensures we only filter traffic coming from your "Local Network" 
    # and not traffic accidentally arriving from the Internet.

  ### --- SECTION 2: THE FILTERING ENGINE (CHAIN) --- ###

  chain SYS_WEBFILTER {
    # 'hook prerouting' with priority -50: This runs after 'mangle' but before 'nat'.
    # It catches the packet before the router decides where to send it.
    type filter hook prerouting priority -50; policy accept;

    # --- AUDIT LOGS ---
    iifname @lan_ifaces ip saddr @log_users_v4 log prefix "[FW-WEBFILTER] " level info
    iifname @lan_ifaces ip6 saddr @log_users_v6 log prefix "[FW-WEBFILTER] " level info
    iifname @lan_ifaces ether saddr @log_users_mac log prefix "[FW-WEBFILTER] " level info
    # LOGIC: If a user on the watchlist tries to browse the web, write a note in the system log
    # so the administrator knows which user triggered the filter.

    # --- THE NFQUEUE HANDOFF ---
    iifname @lan_ifaces ip saddr @ALLOW_ACCESS tcp dport { 80, 443 } queue num 0 bypass
    # LOGIC:
    # 1. 'ip saddr @ALLOW_ACCESS': If the sender is in our special "inspect these users" list.
    # 2. 'tcp dport { 80, 443 }': Only look at Web Traffic (HTTP and HTTPS).
    # 3. 'queue num 0': This "freezes" the packet and sends it to "Queue 0." 
    #    A program reads Queue 0, 
    #    checks the website, and then tells the firewall "Let it through" or "Drop it."
    # 4. 'bypass': This is a safety switch. If your filtering program crashes or stops,
    #    'bypass' allows the user to keep browsing the internet instead of being blocked entirely.
  }
}

table inet geo {
# 'geo' table: This table is dedicated to Geofencing. 
# It handles massive lists of IP addresses belonging to specific countries.

  ### --- SECTION 1: THE GLOBAL BLACKLISTS --- ###

  set geo_v4 {
      type ipv4_addr;
      flags interval; 
  } # PURPOSE: Stores thousands of IPv4 ranges (subnets) assigned to blocked countries.
    # 'flags interval' is vital here because country blocks are always large ranges.

  set geo_v6 {
      type ipv6_addr;
      flags interval;    
  } # PURPOSE: Stores IPv6 prefix ranges for blocked countries.

  set wan_ifaces {
    type ifname;
  } # PURPOSE: Defines which network ports are facing the public internet (e.g., 'eth0').
    # We use this to distinguish between a "hacker from abroad" and a "user on the local LAN."

  ### --- SECTION 2: INBOUND BORDER CONTROL (PREROUTING) --- ###

  chain prerouting {
      # 'priority -250': This is the HIGHEST priority in your entire script. 
      # It runs before mangle, before nat, and before filtering. 
      # If a packet is from a blocked country, we don't want to waste a single CPU cycle on it.
      type filter hook prerouting priority -250; policy accept;

      iifname @wan_ifaces ip saddr @geo_v4 log prefix "[GEOFENCE-BLOCK-V4] " level info drop
      iifname @wan_ifaces ip6 saddr @geo_v6 log prefix "[GEOFENCE-BLOCK-V6] " level info drop
      # LOGIC: 
      # 1. 'iifname @wan_ifaces': "If the packet is coming IN from the Internet..."
      # 2. 'ip saddr @geo_v4': "...and the Sender's IP is in our Geographic Blacklist..."
      # 3. 'log': "...write their attempt to the system log so I can see the attack..."
      # 4. 'drop': "...and immediately delete the packet."
  }

  ### --- SECTION 3: OUTBOUND EXPORT CONTROL (FORWARDING) --- ###

  chain forward {
      # This chain handles traffic passing THROUGH the router (e.g., your PC trying to talk to a server).
      type filter hook forward priority -250; policy accept;

      oifname @wan_ifaces ip daddr @geo_v4 log prefix "[GEOFENCE-BLOCK-V4] " level info drop
      oifname @wan_ifaces ip6 daddr @geo_v6 log prefix "[GEOFENCE-BLOCK-V6] " level info drop
      # LOGIC:
      # 1. 'oifname @wan_ifaces': "If the packet is trying to leave the network, to the Internet..."
      # 2. 'ip daddr @geo_v4': "...and the Destination (where it's going) is in a blocked country..."
      # 3. 'drop': "...stop the connection."
      # PURPOSE: This prevents if a device in our network won't be able to connect to a command-and-control server in a blocked region.
  }
}