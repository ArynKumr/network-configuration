#!/usr/sbin/nft -f

flush ruleset

table inet filter {
	set allowed_ip4 {
		type ipv4_addr
		flags interval
	}

	set allowed_ip6 {
		type ipv6_addr
		flags interval
	}

	set allowed_macs {
		type ether_addr
	}

	set wan_ifaces {
		type ifname
	}

	set lan_ifaces {
		type ifname
	}

	set allowed_ip4_mac {
		type ipv4_addr . ether_addr
	}

	set allowed_ip6_mac {
		type ipv6_addr . ether_addr
	}

	set log_users_v4 {
		type ipv4_addr
		timeout 3s
	}

	set log_users_v6 {
		type ipv6_addr
		timeout 3s
	}

	set log_users_mac {
		type ether_addr
		timeout 3s
	}

	set log_users_v4_mac {
		type ipv4_addr . ether_addr
		timeout 3s
	}

	set log_users_v6_mac {
		type ipv6_addr . ether_addr
		timeout 3s
	}

	set blocked_users_v4_mac {
		type ipv4_addr . ether_addr
	}

	set perma_blocked_mac_users {
		type ether_addr
	}

	chain input {
		type filter hook input priority 0; policy drop;
		iifname "lo" ip saddr 127.0.0.1 accept
		ether saddr @perma_blocked_mac_users ip saddr @log_users_v4 log prefix " [FW-FILTER-INP-PRM-BLK-MAC-I] " group 100
		ether saddr @perma_blocked_mac_users ether saddr @log_users_mac log prefix " [FW-FILTER-INP-PRM-BLK-MAC-I] " group 100
		ether saddr @perma_blocked_mac_users ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-FILTER-INP-PRM-BLK-MAC-I] " group 100
		ether saddr @perma_blocked_mac_users drop
		ct state vmap { invalid : drop, established : accept, related : accept }
		 # RFC 4862 §5.4.2
        # Duplicate Address Detection needs all-nodes and solicited-node multicast
        # to reach tentative addresses.
        ip6 daddr ff02::1 accept
        ip6 daddr ff02::1:ff00:0/104 accept

        # RFC 4861 §6.1.1 / §6.1.2 / §7.1.1 / §7.1.2
        # Router Solicitation, Router Advertisement, Neighbor Solicitation,
        # and Neighbor Advertisement must have Hop Limit = 255.
        icmpv6 type { nd-router-solicit, nd-router-advert, nd-neighbor-solicit, nd-neighbor-advert } ip6 hoplimit != 255 counter drop

        # RFC 4861 §6.1 / §7.1
        # Allow valid ND traffic after the Hop Limit check.
        # Do NOT force fe80::/10 on all NS packets; DAD NS can legitimately use ::.
        icmpv6 type { nd-router-solicit, nd-router-advert, nd-neighbor-solicit, nd-neighbor-advert } accept

        # RFC 8201 §4
        # Packet Too Big must be allowed or Path MTU Discovery breaks.
        icmpv6 type packet-too-big accept

        # RFC 4443 §2.4
        # Core ICMPv6 error / diagnostic types are allowed explicitly.
        # Unknown informational types are left to the kernel to discard silently.
        icmpv6 type { destination-unreachable, time-exceeded, parameter-problem, echo-request, echo-reply } accept
		iifname @lan_ifaces ip saddr @log_users_v4 log prefix " [FW-FILTER-INP-LAN-IN-TRFC-I] " group 100
		iifname @lan_ifaces ether saddr @log_users_mac log prefix " [FW-FILTER-INP-LAN-IN-TRFC-I] " group 100
		iifname @lan_ifaces ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-FILTER-INP-LAN-IN-TRFC-I] " group 100
		iifname @lan_ifaces accept
		meta l4proto icmpv6 accept
		ip saddr @log_users_v4 log prefix " [FW-FILTER-INP-I] " group 100
		ether saddr @log_users_mac log prefix " [FW-FILTER-INP-I] " group 100
		ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-FILTER-INP-I] " group 100
	}

	chain forward {
		type filter hook forward priority 0; policy drop;
		ether saddr @perma_blocked_mac_users ip saddr @log_users_v4 log prefix " [FW-FILTER-FWD-PRM-BLK-MAC-I] " group 100
		ether saddr @perma_blocked_mac_users ether saddr @log_users_mac log prefix " [FW-FILTER-FWD-PRM-BLK-MAC-I] " group 100
		ether saddr @perma_blocked_mac_users ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-FILTER-FWD-PRM-BLK-MAC-I] " group 100
		ether saddr @perma_blocked_mac_users drop
		ip saddr . ether saddr @blocked_users_v4_mac ip saddr @log_users_v4 log prefix " [FW-FILTER-FWD-BLOCKED-USR-MAC-I] " group 100 drop
		ip saddr . ether saddr @blocked_users_v4_mac ether saddr @log_users_mac log prefix " [FW-FILTER-FWD-BLOCKED-USR-MAC-I] " group 100 drop
		ip saddr . ether saddr @blocked_users_v4_mac ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-FILTER-FWD-BLOCKED-USR-MAC-I] " group 100 drop
		ip saddr . ether saddr @blocked_users_v4_mac drop
		ip daddr . ether saddr @blocked_users_v4_mac ip saddr @log_users_v4 log prefix " [FW-FILTER-FWD-BLOCKED-USR-MAC-I] " group 100 drop
		ip daddr . ether saddr @blocked_users_v4_mac ether saddr @log_users_mac log prefix " [FW-FILTER-FWD-BLOCKED-USR-MAC-I] " group 100 drop
		ip daddr . ether saddr @blocked_users_v4_mac ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-FILTER-FWD-BLOCKED-USR-MAC-I] " group 100 drop
		ip daddr . ether daddr @blocked_users_v4_mac drop
		jump FILTER_FORWARD
		ct state vmap { invalid : drop, established : accept, related : accept }
		# RFC 4861 hop-limit validation still applies to forwarded control traffic.
        icmpv6 type { nd-router-solicit, nd-router-advert, nd-neighbor-solicit, nd-neighbor-advert } ip6 hoplimit != 255 counter drop

        icmpv6 type { nd-router-solicit, nd-router-advert, nd-neighbor-solicit, nd-neighbor-advert } accept

        # RFC 8201
        icmpv6 type packet-too-big accept

        # RFC 4443
        icmpv6 type { destination-unreachable, time-exceeded, parameter-problem } accept

        meta l4proto icmpv6 accept
		iifname @lan_ifaces oifname @wan_ifaces ip saddr . ether saddr @allowed_ip4_mac ip saddr @log_users_v4 log prefix " [FW-FILTER-FWD-IPMAC-IO] " group 100
		iifname @lan_ifaces oifname @wan_ifaces ip saddr . ether saddr @allowed_ip4_mac ether saddr @log_users_mac log prefix " [FW-FILTER-FWD-IPMAC-IO] " group 100
		iifname @lan_ifaces oifname @wan_ifaces ip saddr . ether saddr @allowed_ip4_mac ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-FILTER-FWD-IPMAC-IO] " group 100
		iifname @lan_ifaces oifname @wan_ifaces ip saddr . ether saddr @allowed_ip4_mac accept
		iifname @lan_ifaces oifname @wan_ifaces ip6 saddr . ether saddr @allowed_ip6_mac ip6 saddr @log_users_v6 log prefix " [FW-FILTER-FWD-IPMAC-IO] " group 100
		iifname @lan_ifaces oifname @wan_ifaces ip6 saddr . ether saddr @allowed_ip6_mac ether saddr @log_users_mac log prefix " [FW-FILTER-FWD-IPMAC-IO] " group 100
		iifname @lan_ifaces oifname @wan_ifaces ip6 saddr . ether saddr @allowed_ip6_mac ip6 saddr . ether saddr @log_users_v6_mac log prefix " [FW-FILTER-FWD-IPMAC-IO] " group 100
		iifname @lan_ifaces oifname @wan_ifaces ip6 saddr . ether saddr @allowed_ip6_mac accept
		iifname @lan_ifaces oifname @wan_ifaces ether saddr @allowed_macs ip saddr @log_users_v4 log prefix " [FW-FILTER-FWD-MAC-IO] " group 100
		iifname @lan_ifaces oifname @wan_ifaces ether saddr @allowed_macs ether saddr @log_users_mac log prefix " [FW-FILTER-FWD-MAC-IO] " group 100
		iifname @lan_ifaces oifname @wan_ifaces ether saddr @allowed_macs ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-FILTER-FWD-MAC-IO] " group 100
		iifname @lan_ifaces oifname @wan_ifaces ether saddr @allowed_macs accept
		iifname @lan_ifaces oifname @wan_ifaces ip saddr @allowed_ip4 ip saddr @log_users_v4 log prefix " [FW-FILTER-FWD-IP4-IO] " group 100
		iifname @lan_ifaces oifname @wan_ifaces ip saddr @allowed_ip4 ether saddr @log_users_mac log prefix " [FW-FILTER-FWD-IP4-IO] " group 100
		iifname @lan_ifaces oifname @wan_ifaces ip saddr @allowed_ip4 ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-FILTER-FWD-IP4-IO] " group 100
		iifname @lan_ifaces oifname @wan_ifaces ip saddr @allowed_ip4 accept
		iifname @lan_ifaces oifname @wan_ifaces ip6 saddr @allowed_ip6 ip6 saddr @log_users_v6 log prefix " [FW-FILTER-FWD-IP6-IO] " group 100
		iifname @lan_ifaces oifname @wan_ifaces ip6 saddr @allowed_ip6 ether saddr @log_users_mac log prefix " [FW-FILTER-FWD-IP4-IO] " group 100
		iifname @lan_ifaces oifname @wan_ifaces ip6 saddr @allowed_ip6 ip6 saddr . ether saddr @log_users_v6_mac log prefix " [FW-FILTER-FWD-IP6-IO] " group 100
		iifname @lan_ifaces oifname @wan_ifaces ip6 saddr @allowed_ip6 accept
		iifname @lan_ifaces ip6 daddr 64:ff9b::/96 accept
		ip6 nexthdr ipv6-icmp accept
		ip saddr @log_users_v4 log prefix "[FW-FILTER-FWD-I] " group 100
		ether saddr @log_users_mac log prefix "[FW-FILTER-FWD-I] " group 100
		ip saddr . ether saddr @log_users_v4_mac log prefix "[FW-FILTER-FWD-I] " group 100
	}

	chain FILTER_FORWARD {
		return
	}
}
table inet nat {
	set log_users_v4 {
		type ipv4_addr
		timeout 3s
	}

	set log_users_v4_mac {
		type ipv4_addr . ether_addr
		timeout 3s
	}

	set log_users_v6 {
		type ipv6_addr
		timeout 3s
	}

	set log_users_v6_mac {
		type ipv6_addr . ether_addr
		timeout 3s
	}

	set log_users_mac {
		type ether_addr
		timeout 3s
	}

	set allowed_ip4 {
		type ipv4_addr
		flags interval
	}

	set allowed_ip6 {
		type ipv6_addr
		flags interval
	}

	set allowed_macs {
		type ether_addr
	}

	set allowed_ip4_mac {
		type ipv4_addr . ether_addr
	}

	set allowed_ip6_mac {
		type ipv6_addr . ether_addr
	}

	set vpn_subnet {
		type ipv4_addr
		flags interval
	}

	set wan_ifaces {
		type ifname
	}

	set lan_ifaces {
		type ifname
	}

	chain prerouting {
		type nat hook prerouting priority 0; policy accept;
		ip saddr @allowed_ip4 fib daddr type local tcp dport 80 ip saddr @log_users_v4 log prefix " [FW-NAT-PRE-IP-RDRCT-I] " group 100
		ip saddr @allowed_ip4 fib daddr type local tcp dport 80 ether saddr @log_users_mac log prefix " [FW-NAT-PRE-IP-RDRCT-I] " group 100
		ip saddr @allowed_ip4 fib daddr type local tcp dport 80 ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-NAT-PRE-IP-RDRCT-I] " group 100
		ip saddr @allowed_ip4 fib daddr type local tcp dport 80 redirect to :8000
		ether saddr @allowed_macs fib daddr type local tcp dport 80 ip saddr @log_users_v4 log prefix " [FW-NAT-PRE-MAC-RDRCT-I] " group 100
		ether saddr @allowed_macs fib daddr type local tcp dport 80 ether saddr @log_users_mac log prefix " [FW-NAT-PRE-MAC-RDRCT-I] " group 100
		ether saddr @allowed_macs fib daddr type local tcp dport 80 ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-NAT-PRE-MAC-RDRCT-I] " group 100
		ether saddr @allowed_macs fib daddr type local tcp dport 80 redirect to :8000
		ip saddr . ether saddr @allowed_ip4_mac fib daddr type local tcp dport 80 ip saddr @log_users_v4 log prefix " [FW-NAT-PRE-IP-MAC-RDRCT-I] " group 100
		ip saddr . ether saddr @allowed_ip4_mac fib daddr type local tcp dport 80 ether saddr @log_users_mac log prefix " [FW-NAT-PRE-IP-MAC-RDRCT-I] " group 100
		ip saddr . ether saddr @allowed_ip4_mac fib daddr type local tcp dport 80 ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-NAT-PRE-IP-MAC-RDRCT-I] " group 100
		ip saddr . ether saddr @allowed_ip4_mac fib daddr type local tcp dport 80 redirect to :8000
		iifname @lan_ifaces meta mark & 0xff000000 == 0x01000000 udp dport 53 ip saddr @log_users_v4 log prefix " [FW-NAT-PRE-FALSE-DNS-RDRCT-I] " group 100
		iifname @lan_ifaces meta mark & 0xff000000 == 0x01000000 udp dport 53 ether saddr @log_users_mac log prefix " [FW-NAT-PRE-FALSE-DNS-RDRCT-I] " group 100
		iifname @lan_ifaces meta mark & 0xff000000 == 0x01000000 udp dport 53 ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-NAT-PRE-FALSE-DNS-RDRCT-I] " group 100
		iifname @lan_ifaces meta mark & 0xff000000 == 0x01000000 udp dport 53 redirect to :5300
		iifname @lan_ifaces meta mark & 0xff000000 == 0x01000000 tcp dport 53 ip saddr @log_users_v4 log prefix " [FW-NAT-PRE-FALSE-DNS-RDRCT-I] " group 100
		iifname @lan_ifaces meta mark & 0xff000000 == 0x01000000 tcp dport 53 ether saddr @log_users_mac log prefix " [FW-NAT-PRE-FALSE-DNS-RDRCT-I] " group 100
		iifname @lan_ifaces meta mark & 0xff000000 == 0x01000000 tcp dport 53 ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-NAT-PRE-FALSE-DNS-RDRCT-I] " group 100
		iifname @lan_ifaces meta mark & 0xff000000 == 0x01000000 tcp dport 53 redirect to :5300
		iifname @lan_ifaces udp dport 53 ip saddr @log_users_v4 log prefix " [FW-NAT-PRE-DNS-RDRCT-I] " group 100
		iifname @lan_ifaces udp dport 53 ether saddr @log_users_mac log prefix " [FW-NAT-PRE-DNS-RDRCT-I] " group 100
		iifname @lan_ifaces udp dport 53 ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-NAT-PRE-DNS-RDRCT-I] " group 100
		iifname @lan_ifaces udp dport 53 redirect to :53
		iifname @lan_ifaces tcp dport 53 ip saddr @log_users_v4 log prefix " [FW-NAT-PRE-DNS-RDRCT-I] " group 100
		iifname @lan_ifaces tcp dport 53 ether saddr @log_users_mac log prefix " [FW-NAT-PRE-DNS-RDRCT-I] " group 100
		iifname @lan_ifaces tcp dport 53 ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-NAT-PRE-DNS-RDRCT-I] " group 100
		iifname @lan_ifaces tcp dport 53 redirect to :53
		jump NAT_PRE
		iifname @lan_ifaces ip saddr @allowed_ip4 ip saddr @log_users_v4 log prefix " [FW-NAT-PRE-IP-I] " group 100
		iifname @lan_ifaces ip saddr @allowed_ip4 ether saddr @log_users_mac log prefix " [FW-NAT-PRE-IP-I] " group 100
		iifname @lan_ifaces ip saddr @allowed_ip4 ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-NAT-PRE-IP-I] " group 100
		iifname @lan_ifaces ip saddr @allowed_ip4 accept
		iifname @lan_ifaces ip6 saddr @allowed_ip6 ip6 saddr @log_users_v6 log prefix " [FW-NAT-PRE-IP-I] " group 100
		iifname @lan_ifaces ip6 saddr @allowed_ip6 ether saddr @log_users_mac log prefix " [FW-NAT-PRE-IP-I] " group 100
		iifname @lan_ifaces ip6 saddr @allowed_ip6 ip6 saddr . ether saddr @log_users_v6_mac log prefix " [FW-NAT-PRE-IP-I] " group 100
		iifname @lan_ifaces ip6 saddr @allowed_ip6 accept
		iifname @lan_ifaces ether saddr @allowed_macs ip saddr @log_users_v4 log prefix " [FW-NAT-PRE-MAC-I] " group 100
		iifname @lan_ifaces ether saddr @allowed_macs ether saddr @log_users_mac log prefix " [FW-NAT-PRE-MAC-I] " group 100
		iifname @lan_ifaces ether saddr @allowed_macs ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-NAT-PRE-MAC-I] " group 100
		iifname @lan_ifaces ether saddr @allowed_macs accept
		iifname @lan_ifaces ip saddr . ether saddr @allowed_ip4_mac ip saddr @log_users_v4 log prefix " [FW-NAT-PRE-IP-MAC-I] " group 100
		iifname @lan_ifaces ip saddr . ether saddr @allowed_ip4_mac ether saddr @log_users_mac log prefix " [FW-NAT-PRE-IP-MAC-I] " group 100
		iifname @lan_ifaces ip saddr . ether saddr @allowed_ip4_mac ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-NAT-PRE-IP-MAC-I] " group 100
		iifname @lan_ifaces ip saddr . ether saddr @allowed_ip4_mac accept
		iifname @lan_ifaces ip6 saddr . ether saddr @allowed_ip6_mac ip6 saddr @log_users_v6 log prefix " [FW-NAT-PRE-IP-MAC-I] " group 100
		iifname @lan_ifaces ip6 saddr . ether saddr @allowed_ip6_mac ether saddr @log_users_mac log prefix " [FW-NAT-PRE-IP-MAC-I] " group 100
		iifname @lan_ifaces ip6 saddr . ether saddr @allowed_ip6_mac ip6 saddr . ether saddr @log_users_v6_mac log prefix " [FW-NAT-PRE-IP-MAC-I] " group 100
		iifname @lan_ifaces ip6 saddr . ether saddr @allowed_ip6_mac accept
		iifname @lan_ifaces tcp dport 443 ip saddr @log_users_v4 log prefix " [FW-NAT-PRE-443-RDRCT-I] " group 100
		iifname @lan_ifaces tcp dport 443 ether saddr @log_users_mac log prefix " [FW-NAT-PRE-443-RDRCT-I] " group 100
		iifname @lan_ifaces tcp dport 443 ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-NAT-PRE-443-RDRCT-I] " group 100
		iifname @lan_ifaces tcp dport 443 redirect to :443
		iifname @lan_ifaces tcp dport 80 ip saddr @log_users_v4 log prefix " [FW-NAT-PRE-80-RDRCT-I] " group 100
		iifname @lan_ifaces tcp dport 80 ether saddr @log_users_mac log prefix " [FW-NAT-PRE-80-RDRCT-I] " group 100
		iifname @lan_ifaces tcp dport 80 ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-NAT-PRE-80-RDRCT-I] " group 100
		iifname @lan_ifaces tcp dport 80 redirect to :80
	}

	chain NAT_PRE {
		return
	}

	chain postrouting {
		type nat hook postrouting priority 100; policy accept;
		jump NAT_POST
		oifname @wan_ifaces ip saddr @allowed_ip4 ip saddr @log_users_v4 log prefix " [FW-NAT-POST-IP-SNAT-OI] " group 100
		oifname @wan_ifaces ip saddr @allowed_ip4 ether saddr @log_users_mac log prefix " [FW-NAT-POST-IP-SNAT-OI] " group 100
		oifname @wan_ifaces ip saddr @allowed_ip4 ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-NAT-POST-IP-SNAT-OI] " group 100
		oifname @wan_ifaces ip saddr @allowed_ip4 masquerade
		oifname @wan_ifaces ip6 saddr @allowed_ip6 ip6 daddr != 64:ff9b::/96 ip6 saddr @log_users_v6 log prefix " [FW-NAT-POST-IP-SNAT-OI] " group 100
		oifname @wan_ifaces ip6 saddr @allowed_ip6 ip6 daddr != 64:ff9b::/96 ether saddr @log_users_mac log prefix " [FW-NAT-POST-IP-SNAT-OI] " group 100
		oifname @wan_ifaces ip6 saddr @allowed_ip6 ip6 daddr != 64:ff9b::/96 ip6 saddr . ether saddr @log_users_v6_mac log prefix " [FW-NAT-POST-IP-SNAT-OI] " group 100
		oifname @wan_ifaces ip6 saddr @allowed_ip6 ip6 daddr != 64:ff9b::/96 masquerade
		oifname @wan_ifaces ether saddr @allowed_macs ip saddr @log_users_v4 log prefix " [FW-NAT-POST-MAC-SNAT-OI] " group 100
		oifname @wan_ifaces ether saddr @allowed_macs ether saddr @log_users_mac log prefix " [FW-NAT-POST-MAC-SNAT-OI] " group 100
		oifname @wan_ifaces ether saddr @allowed_macs ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-NAT-POST-MAC-SNAT-OI] " group 100
		oifname @wan_ifaces ether saddr @allowed_macs masquerade
		oifname @wan_ifaces ip saddr . ether saddr @allowed_ip4_mac ip saddr @log_users_v4 log prefix " [FW-NAT-POST-IP-MAC-SNAT-OI] " group 100
		oifname @wan_ifaces ip saddr . ether saddr @allowed_ip4_mac ether saddr @log_users_mac log prefix " [FW-NAT-POST-IP-MAC-SNAT-OI] " group 100
		oifname @wan_ifaces ip saddr . ether saddr @allowed_ip4_mac ip saddr . ether saddr @log_users_v4_mac log prefix " [FW-NAT-POST-IP-MAC-SNAT-OI] " group 100
		oifname @wan_ifaces ip saddr . ether saddr @allowed_ip4_mac masquerade
	}

	chain NAT_POST {
		return
	}
}
table inet mangle {

	map user4_marks {
		type ipv4_addr : mark
	}

	map user6_marks {
		type ipv6_addr : mark
	}

	map src_client_mark {
		type ipv4_addr . inet_proto . inet_service : mark
	}

	map dst_client_mark {
		type ipv4_addr . inet_proto . inet_service : mark
	}

	set vpn_subnet {
		type ipv4_addr
		flags interval
	}

	set lan_ifaces {
		type ifname
	}

	chain prerouting {
		type filter hook prerouting priority -150; policy accept;
		ct mark & 0xff000000 == 0x03000000 reject
		meta mark & 0xff000000 == 0x03000000 reject
		meta mark set ip saddr . meta l4proto . th sport map @src_client_mark
		meta mark set ip saddr map @user4_marks
		meta mark set ip6 saddr map @user6_marks
		ip saddr @vpn_subnet oifname @lan_ifaces meta mark set 0x00000069
		iifname @lan_ifaces oifname @lan_ifaces meta mark set 0x00000069
		ct mark set meta mark
	}

	chain forward {
		type filter hook forward priority -150; policy accept;
		ct mark & 0xff000000 == 0x03000000 reject
		meta mark & 0xff000000 == 0x03000000 reject
		meta mark set ip daddr . meta l4proto . th dport map @dst_client_mark
		meta mark set ip daddr map @user4_marks
		meta mark set ip6 daddr map @user6_marks
		ip daddr @vpn_subnet iifname @lan_ifaces meta mark set 0x00000069
		iifname @lan_ifaces oifname @lan_ifaces meta mark set 0x00000069
		ct mark set meta mark
	}

	chain postrouting {
		type filter hook postrouting priority -150; policy accept;
		meta mark set ct mark
	}
}
table inet webfilter {
	set log_users_v4 {
		type ipv4_addr
		timeout 3s
	}

	set log_users_v4_mac {
		type ipv4_addr . ether_addr
		timeout 3s
	}

	set log_users_mac {
		type ether_addr
		timeout 3s
	}

	set allowed_ip4 {
		type ipv4_addr
		flags interval
	}

	set allowed_macs {
		type ether_addr
	}

	set allowed_ip4_mac {
		type ipv4_addr . ether_addr
	}

	set lan_ifaces {
		type ifname
	}

	chain SYS_WEBFILTER {
		type filter hook prerouting priority -100 ; policy accept;
