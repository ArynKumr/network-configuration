#run these while configuring network interface and while bootup on all ifaces
 
    # 1. CLEAN SLATE: Removes any existing traffic rules (qdiscs) from the interface. 
    # '2>/dev/null || true' ensures the script doesn't crash if no rules exist yet.
        tc qdisc del dev <iface_name> root 2>/dev/null || true

    # 2. THE SCHEDULER: Adds the 'htb' scheduler. 
    # 'r2q 400' (Rate to Quantum) helps balance CPU usage vs. precision for high-speed links.
        tc qdisc add dev <iface_name> root handle 1: htb default <default_class_ID> r2q 400

    # 3. THE MASTER PIPELINE: Defines the total capacity of the physical cable (e.g., 1Gbit/1Mbit/1Kbit).
    # All user speeds will be carved out of this parent class (1:1).
        tc class add dev <iface_name> parent 1: classid 1:1 htb rate <iface_speed>Gbit/1Mbit/1Kbit ceil <iface_speed>Gbit/1Mbit/1Kbit

    # 4. THE GUEST/DEFAULT LANE: A 'safety' lane for traffic that isn't tagged.
    # This ensures that even unknown traffic doesn't crash the router.
        tc class add dev <iface_name> parent 1:1 classid 1:<default_class_ID> htb rate <speed>Gbit/1Mbit/1Kbit ceil <speed>Gbit/1Mbit/1Kbit

    # 5. FAIRNESS: Adds 'sfq' (Stochastic Fairness Queuing). 
    # 'perturb 10' reshuffles traffic every 10 seconds so one download stream can't block another.
        tc qdisc add dev <iface_name> parent 1:<default_class_ID> handle <default_class_ID>: sfq perturb 10

#run these when a user comes online and a class is assigned to the user both lan and wan iface of the user wan iface speed would control the upload speed and lan iface speed would control the download speed

    # 1. CREATE THE USER LANE: Assigns a dedicated speed limit to the user's specific Class ID.
    # 'rate' is guaranteed speed; 'ceil' is the absolute maximum they can hit.
        tc class add dev <iface_name> parent 1:1 classid 1:<user_class_id> htb rate <user_plan_speed>Gbit/1Mbit/1Kbit ceil <user_plan_speed>Gbit/1Mbit/1Kbit

    # 2. USER-LEVEL FAIRNESS: Ensures that if one user opens 100 tabs, 
    # those 100 tabs share the user's speed fairly.
        tc qdisc add dev <iface_name> parent 1:<user_class_id> handle <user_class_id>: sfq perturb 10

    # 3. THE BRIDGE (Connects nftables to tc): 
    # This looks for the 'fwmark' (the tag you set in the 'mangle' table earlier).
    # If a packet has the mark 0x0000<marks>, it is pushed into the user's specific lane (1:<user_class_id>).
        tc filter add dev <iface_name> protocol ip parent 1:0 prio 1 handle 0x0000<tc_class_marks>/0x0000FFFF fw flowid 1:<user_class_id>