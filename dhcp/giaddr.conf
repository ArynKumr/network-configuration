###############################################################################
# KEA DHCPv4 CONFIGURATION FILE
#
# This entire document is parsed as JSON.
# That means:
# - Trailing commas are illegal
# - Comments are not actually supported by JSON
# - Kea pretends they are, because ISC is merciful
#
# If Kea refuses to start:
#   kea-dhcp4 -t -c /path/to/this/file
# before blaming the universe.
###############################################################################

{
  ###########################################################################
  # "Dhcp4"
  #
  # Root container for the IPv4 DHCP server.
  # Everything inside this block applies ONLY to DHCPv4.
  #
  # Kea runs DHCPv4 and DHCPv6 as logically separate daemons
  # because protocol purity apparently matters more than sanity.
  ###########################################################################
  "Dhcp4": {

    #########################################################################
    # interfaces-config
    #
    # This section defines WHERE Kea listens for DHCP packets.
    #
    # IMPORTANT:
    # - If an interface is NOT listed here, Kea will ignore it.
    # - There is no auto-detection.
    # - “But tcpdump sees packets” does not matter.
    #
    # Kea binds raw sockets directly to interfaces.
    #########################################################################
    "interfaces-config": {

      #######################################################################
      # interfaces
      #
      # Explicit allow-list of interfaces.
      #
      # Valid entries include:
      # - Physical NICs        : enp7s0
      # - VLAN subinterfaces  : enp7s0.100
      # - Linux bridges       : br0, virbr5
      #
      # DO NOT put IP addresses here.
      # DO NOT put wildcards.
      # DO NOT expect Kea to guess.
      #######################################################################
      "interfaces": [

        #####################################################################
        # <DIRECT_INTERFACE>
        #
        # Use this when:
        # - Clients are on the same L2 segment as Kea
        # - No relay agent is involved
        # - giaddr in DHCP packets will be 0.0.0.0
        #
        # Example:
        #   "enp7s0"
        #####################################################################
        "<DIRECT_INTERFACE>",

        #####################################################################
        # <VLAN_INTERFACE_IF_USED>
        #
        # Required ONLY if:
        # - DHCP requests arrive tagged
        # - VLAN termination happens on this host
        # - You are NOT using an external relay
        #
        # Example:
        #   "enp7s0.10"
        #####################################################################
        "<VLAN_INTERFACE_IF_USED>",

        #####################################################################
        # <BRIDGE_INTERFACE_IF_USED>
        #
        # Used when Kea is connected to a Linux bridge.
        #
        # Common cases:
        # - Hypervisors (KVM, libvirt)
        # - Software switches
        # - Containers using bridged networking
        #
        # Example:
        #   "br0"
        #####################################################################
        "<BRIDGE_INTERFACE_IF_USED>"
      ]
    },

    #########################################################################
    # control-socket
    #
    # IPC endpoint used by:
    # - kea-shell
    # - REST API frontends
    # - Automation scripts
    #
    # Without this, runtime reconfiguration is dead.
    #########################################################################
    "control-socket": {
      "socket-type": "unix",

      # Path MUST be writable by kea-dhcp4
      # Directory must already exist
      "socket-name": "/var/run/kea/kea4-ctrl-socket"
    },

    #########################################################################
    # lease-database (SQL BACKEND)
    #
    # This defines a persistent database for DHCP leases.
    #
    # WARNING:
    # You later define a SECOND lease-database using memfile.
    # Kea will only use ONE.
    #
    # If this is intentional, fine.
    # If not, congratulations on the silent misconfiguration.
    #########################################################################
    "lease-database": {
      "type": "mysql",

      # Database name containing lease tables
      "name": "${DB_NAME}",

      # SQL user Kea authenticates as
      "user": "${DB_USER}",

      # Password for the above user
      "password": "${DB_USER_PASSWORD}",

      # Database host (IP or hostname)
      "host": "${DB_HOST}",

      # TCP port for MySQL
      "port": ${DB_PORT}
    },

    #########################################################################
    # hosts-database
    #
    # Stores static host reservations:
    # - MAC -> IP
    # - Client ID -> IP
    #
    # Keeping this in SQL allows:
    # - Centralized management
    # - Dynamic updates
    #########################################################################
    "hosts-database": {
      "type": "mysql",
      "name": "${DB_NAME}",
      "user": "${DB_USER}",
      "password": "${DB_USER_PASSWORD}",
      "host": "${DB_HOST}",
      "port": ${DB_PORT}
    },

    #########################################################################
    # expired-leases-processing
    #
    # Controls how aggressively Kea cleans up expired leases.
    #
    # This affects:
    # - Address reuse speed
    # - Database churn
    # - CPU usage
    #########################################################################
    "expired-leases-processing": {

      # Time (seconds) Kea waits before starting reclaim
      "reclaim-timer-wait-time": 10,

      # Interval between flushes of reclaimed leases
      "flush-reclaimed-timer-wait-time": 25,

      # How long reclaimed leases are held before deletion
      "hold-reclaimed-time": 3600,

      # Maximum leases reclaimed per cycle
      "max-reclaim-leases": 100,

      # Maximum time (ms) spent reclaiming per cycle
      "max-reclaim-time": 250,

      # Number of cycles without warnings
      "unwarned-reclaim-cycles": 5
    },

    #########################################################################
    # calculate-tee-times
    #
    # Enables RFC-compliant T1/T2 calculation.
    #
    # If false, clients may renew too early or too late.
    #########################################################################
    "calculate-tee-times": true,

    #########################################################################
    # valid-lifetime (GLOBAL DEFAULT)
    #
    # Lease lifetime in seconds.
    #
    # Applies unless overridden at subnet or pool level.
    #########################################################################
    "valid-lifetime": ${VALID_LIFETIME_IPv4},

    #########################################################################
    # lease-database (MEMFILE BACKEND)
    #
    # This is a SECOND lease-database definition.
    #
    # Kea will NOT merge these.
    # One of them wins.
    #
    # Pick one:
    # - SQL for durability and clustering
    # - memfile for simplicity and speed
    #########################################################################
    "lease-database": {

      # In-memory lease storage with periodic disk flush
      "type": "memfile",

      # Persist leases across daemon restarts
      "persist": true,

      # On-disk CSV lease file
      "name": "/var/lib/kea/kea-leases4.csv"
    },

    #########################################################################
    # subnet4
    #
    # List of ALL IPv4 subnets Kea is allowed to serve.
    #
    # Matching rules:
    # - Direct clients: based on interface and source IP
    # - Relayed clients: based on giaddr
    #
    # No match = no response.
    #########################################################################
    "subnet4": [

      #######################################################################
      # FLAT (DIRECT) SUBNET
      #
      # No relay agent involved.
      # Clients broadcast directly to Kea.
      #######################################################################
      {
        "id": <ID_FLAT>,

        # Must correspond to the L3 network
        # configured on the listening interface
        "subnet": "<FLAT_SUBNET_CIDR>",

        "pools": [
          {
            # Address allocation range
            "pool": "<FLAT_POOL_START> - <FLAT_POOL_END>"
          }
        ]
      },

      #######################################################################
      # PHYSICAL RELAY SUBNET
      #
      # DHCP packets arrive via a relay agent.
      # giaddr identifies the downstream network.
      #######################################################################
      {
        "id": <ID_PHYSICAL>,
        "subnet": "<PHYSICAL_SUBNET_CIDR>",

        "relay": {
          # Allowed relay agent IPs
          "ip-addresses": [ "<PHYSICAL_RELAY_IP>" ]
        },

        "pools": [
          {
            "pool": "<PHYSICAL_POOL_START> - <PHYSICAL_POOL_END>"
          }
        ]
      },

      #######################################################################
      # VLAN RELAY SUBNET
      #
      # Identical logic to physical relay.
      # VLAN separation usually happens upstream.
      #######################################################################
      {
        "id": <ID_VLAN>,
        "subnet": "<VLAN_SUBNET_CIDR>",

        "relay": {
          "ip-addresses": [ "<VLAN_RELAY_IP>" ]
        },

        "pools": [
          {
            "pool": "<VLAN_POOL_START> - <VLAN_POOL_END>"
          }
        ]
      },

      #######################################################################
      # BRIDGE RELAY SUBNET
      #
      # Used with:
      # - Hypervisors
      # - Software switches
      # - Nested virtualization
      #######################################################################
      {
        "id": <ID_BRIDGE>,
        "subnet": "<BRIDGE_SUBNET_CIDR>",

        "relay": {
          "ip-addresses": [ "<BRIDGE_RELAY_IP>" ]
        },

        "pools": [
          {
            "pool": "<BRIDGE_POOL_START> - <BRIDGE_POOL_END>"
          }
        ]
      }
    ]

    #########################################################################
    # End of Dhcp4 block
    #
    # If Kea starts and does nothing:
    # - Check interfaces-config
    # - Check relay IPs
    # - Check subnet CIDRs
    # - Then check your assumptions
    #########################################################################
  }
}
