###############################################################################
# Top-level object for Kea DHCPv4 configuration.
# Everything inside this block applies ONLY to IPv4 DHCP.
# If you mess this up, clients stare at you silently and get no IPs.
###############################################################################

{
  ###########################################################################
  # "Dhcp4" is the main container for the IPv4 DHCP server.
  # Kea uses separate blocks for Dhcp4 and Dhcp6 because mixing them would
  # make too much sense.
  ###########################################################################
  "Dhcp4": {

    #########################################################################
    # interfaces-config
    # This section tells Kea WHERE it is allowed to listen for DHCP packets.
    # If an interface is not listed here, Kea pretends it does not exist.
    # No packets in, no packets out, no mercy.
    #########################################################################
    "interfaces-config": {

      #######################################################################
      # interfaces
      # This is a literal allow-list of interfaces.
      # Kea binds raw sockets here.
      # Order does not matter.
      #
      # You can mix:
      # - Physical NICs (enp7s0)
      # - VLAN subinterfaces (enp7s0.100)
      # - Linux bridges (br0, virbr5)
      #
      # Kea does NOT auto-discover interfaces because trust is overrated.
      #######################################################################
      "interfaces": [

        # <DIRECT_INTERFACE>
        # A plain physical interface.
        # Used when Kea serves DHCP directly on a NIC
        # with no relay and no tagging.
        "<DIRECT_INTERFACE>",

        # <VLAN_INTERFACE_IF_USED>
        # A VLAN subinterface like enp7s0.10.
        # Required if DHCP requests arrive tagged
        # and are terminated locally instead of relayed.
        "<VLAN_INTERFACE_IF_USED>",

        # <BRIDGE_INTERFACE_IF_USED>
        # A Linux bridge interface.
        # Used when Kea is attached to a software switch
        # and DHCP packets come from bridged ports.
        "<BRIDGE_INTERFACE_IF_USED>"
      ]
    },

    #########################################################################
    # lease-database
    # This defines how and where Kea stores DHCP leases.
    # Leases are not optional unless you enjoy chaos.
    #########################################################################
    "lease-database": {

      #######################################################################
      # type: memfile
      # "memfile" means:
      # - Leases are kept in memory for performance
      # - Periodically flushed to disk
      # Faster than SQL, less durable, but good enough
      # unless you are running an ISP with lawyers.
      #######################################################################
      "type": "memfile",

      #######################################################################
      # persist: true
      # When true, leases survive daemon restarts.
      # When false, every restart nukes reality
      # and clients renegotiate like it's day one.
      #######################################################################
      "persist": true,

      #######################################################################
      # name
      # Path to the on-disk lease file.
      # CSV because humans insisted on readability
      # and now everyone regrets it.
      #######################################################################
      "name": "/var/lib/kea/kea-leases4.csv"
    },

    #########################################################################
    # subnet4
    # This is the heart of DHCP.
    # Each entry defines ONE IPv4 subnet Kea can serve.
    # If a packet does not match any subnet here,
    # Kea ignores it with professional indifference.
    #########################################################################
    "subnet4": [

      #######################################################################
      # FLAT DHCP SUBNET
      # No relay.
      # Clients are on the same L2 segment as Kea.
      # giaddr = 0.0.0.0
      #######################################################################
      {
        # id
        # Arbitrary unique integer.
        # Used internally and for logging.
        # Duplicate IDs cause silent confusion.
        "id": <ID_FLAT>,

        # subnet
        # CIDR of the network served directly.
        # Must match the interface IP topology,
        # or Kea will smile and do nothing.
        "subnet": "<FLAT_SUBNET_CIDR>",

        # pools
        # One or more address ranges inside the subnet.
        # Clients receive addresses ONLY from pools.
        "pools": [
          {
            # pool
            # Inclusive IPv4 range.
            # No overlap unless you enjoy undefined behavior.
            "pool": "<FLAT_POOL_START> - <FLAT_POOL_END>"
          }
        ]
      },

      #######################################################################
      # PHYSICAL PORT RELAY SUBNET
      # DHCP requests arrive via a relay agent
      # connected to a physical interface.
      # giaddr is set by the relay.
      #######################################################################
      {
        "id": <ID_PHYSICAL>,

        # subnet
        # The logical subnet of the downstream clients,
        # NOT the relay interface network.
        "subnet": "<PHYSICAL_SUBNET_CIDR>",

        # relay
        # Defines which relay IPs are allowed
        # to claim responsibility for this subnet.
        "relay": {

          # ip-addresses
          # One or more relay agent IPs.
          # If giaddr does not match this list,
          # the packet is ignored without ceremony.
          "ip-addresses": [ "<PHYSICAL_RELAY_IP>" ]
        },

        "pools": [
          {
            "pool": "<PHYSICAL_POOL_START> - <PHYSICAL_POOL_END>"
          }
        ]
      },

      #######################################################################
      # VLAN-BASED RELAY SUBNET
      # Same logic as physical relay,
      # except traffic is usually segregated by VLANs.
      #######################################################################
      {
        "id": <ID_VLAN>,
        "subnet": "<VLAN_SUBNET_CIDR>",

        "relay": {
          # Relay IP typically belongs to
          # an SVI or router subinterface.
          "ip-addresses": [ "<VLAN_RELAY_IP>" ]
        },

        "pools": [
          {
            "pool": "<VLAN_POOL_START> - <VLAN_POOL_END>"
          }
        ]
      },

      #######################################################################
      # BRIDGE-BASED RELAY SUBNET
      # Used when traffic comes from a software switch
      # or hypervisor bridge acting as a relay source.
      #######################################################################
      {
        "id": <ID_BRIDGE>,
        "subnet": "<BRIDGE_SUBNET_CIDR>",

        "relay": {
          # Usually the bridge-facing gateway IP.
          "ip-addresses": [ "<BRIDGE_RELAY_IP>" ]
        },

        "pools": [
          {
            "pool": "<BRIDGE_POOL_START> - <BRIDGE_POOL_END>"
          }
        ]
      }
    ],

    #########################################################################
    # valid-lifetime
    # Lease lifetime in seconds.
    # This is how long the client may use the IP
    # before it MUST stop if renewal fails.
    #########################################################################
    "valid-lifetime": 3600,

    #########################################################################
    # renew-timer (T1)
    # Time in seconds before the client attempts renewal
    # with the original DHCP server.
    # Typically ~25% of valid-lifetime.
    #########################################################################
    "renew-timer": 900,

    #########################################################################
    # rebind-timer (T2)
    # Time before the client broadcasts for ANY server.
    # Typically ~50% of valid-lifetime.
    # This is the client panicking, politely.
    #########################################################################
    "rebind-timer": 1800
  }
}
